<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile Card</title>

    <link rel="stylesheet" href="style.css">

    <style>
        article {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<header>
    <h1>My Company</h1>
    <p>Your success is our priority</p>
</header>

<main>
    <article>
        <h2>About Us</h2>
        <p>We are a startup company focused on providing quality services.</p>
    </article>
</main>

<footer>
    <p>© 2026 My Company</p>

    <button style="background-color: blue; color: white; padding: 10px;">
        Contact Us
    </button>
</footer>

</body>
</html>
